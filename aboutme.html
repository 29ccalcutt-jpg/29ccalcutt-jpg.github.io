<body>
    <button id="startButton" onMouseOver="moveButton()">Click here for free robux</button>
</body>
<script>
    function moveButton() {
        var button = document.getElementById("startButton")
        var width = window.innerWidth;
        var height =window.innerHeight;

        //get a random position in the width
        width = Math.random() * width;
        height = Math.random() * height;

        button.style.left = width + "px";
        button.style.top = height + "px";

    }
</script>
